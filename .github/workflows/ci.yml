name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check JSON files
        run: |
          python -m json.tool schema/overtime-event.schema.json >/dev/null
          python -m json.tool schema/evidence-item.schema.json >/dev/null
          python -m json.tool schema/evidence-package.schema.json >/dev/null
          python -m json.tool examples/mock-git-log/git-log.json >/dev/null
          python -m json.tool examples/mock-evidence-package/package.json >/dev/null

      - name: Validate mock evidence package
        run: python scripts/validate_evidence_package.py examples/mock-evidence-package/package.json

      - name: Render mock report
        run: python scripts/render_mock_report.py examples/mock-evidence-package/package.json >/dev/null

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Scan for non-mock sensitive patterns
        shell: python
        run: |
          from pathlib import Path
          import re
          import sys

          patterns = [
              ("phone-number-like value", re.compile(r"(?<!\d)1[3-9]\d{9}(?!\d)")),
              ("id-card-like value", re.compile(r"\b\d{17}[\dXx]\b")),
              ("real-commit-like hash", re.compile(r"(?<!mock-)(?<!schema-)\b[0-9a-fA-F]{7,40}\b")),
              (
                  "forbidden output path",
                  re.compile(r"history-analysis[\\/]" + "outputs|" + "outputs" + r"/"),
              ),
          ]
          ignored_dirs = {".git", "__pycache__"}
          failures = []
          for path in Path(".").rglob("*"):
              if not path.is_file():
                  continue
              if any(part in ignored_dirs for part in path.parts):
                  continue
              text = path.read_text(encoding="utf-8", errors="ignore")
              phone_cleaned = patterns[0][1].sub("", text)
              for label, pattern in patterns:
                  search_text = phone_cleaned if label == "real-commit-like hash" else text
                  if pattern.search(search_text):
                      failures.append(f"{path}: {label}")

          if failures:
              print("\n".join(failures))
              sys.exit(1)
